<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Health Watch Dashboard</title>

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/cards.css">
  <link rel="stylesheet" href="css/tabs.css">
  <link rel="stylesheet" href="css/responsive.css">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo sidebar-logo-large">
        <div class="sidebar-logo-icon" aria-hidden="true">
          <img class="sidebar-logo-img" src="assets/icons/smart-watch-logo.svg" alt="Smart Health Watch logo">
        </div>
        <div class="sidebar-logo-text">
          <div class="sidebar-logo-title">Smart<br>Watch</div>
          <div class="sidebar-logo-subtitle">Health IoT</div>
        </div>
      </div>

      <nav class="sidebar-nav" aria-label="Dashboard tabs"></nav>

      <div class="sidebar-device">
        <div class="sidebar-device-label">Thiết bị</div>
        <div class="sidebar-device-status">
          <span class="status-dot"></span>
          <span>Device Online</span>
        </div>
        <div class="sidebar-device-name" id="sidebarDeviceName">watch_001</div>
        <div class="sidebar-device-sync">Firebase realtime</div>
        <div style="margin-top:14px;color:#cbd5e1;font-weight:800;" id="sidebarTime">--:--:--</div>
        <div style="margin-top:4px;color:#94a3b8;font-size:12px;" id="sidebarDate">--/--/----</div>
      </div>
    </aside>

    <main class="main">
      <div class="shell">
        <header class="header">
          <div>
            <h1 id="pageTitle">Smart Health Watch</h1>
            <div class="subtitle" id="pageSubtitle">Firebase Realtime IoT Health Dashboard</div>
          </div>

          <div class="header-actions">
            <div class="online" id="onlineStatus">Connecting...</div>
            <button class="notification-btn" type="button" aria-label="Thông báo">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 7h18s-3 0-3-7" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M10 19a2 2 0 0 0 4 0" stroke="currentColor" stroke-linecap="round"/>
              </svg>
            </button>
          </div>
        </header>

        <section id="pageContent" class="page-content"></section>
      </div>
    </main>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
